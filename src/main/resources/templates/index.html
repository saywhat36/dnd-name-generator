<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>D&amp;D Name Generator</title>
    <!-- htmx via CDN for this minimal browse-only slice -- see docs/DECISIONS.md
         for why a webjar dependency isn't warranted yet. -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .toggle-group { margin-bottom: 0.5rem; }
        .toggle-group button { margin-right: 0.25rem; }
        .toggle-group button.selected { font-weight: bold; text-decoration: underline; }
        .name-row { margin-bottom: 0.25rem; }
        .name-row button { margin-left: 0.5rem; }
    </style>
</head>
<body>
<h1>D&amp;D Name Generator</h1>

<!-- Race/gender/source picker, each rendered as a button group -- clicking a button
     both selects it (highlighted via the "selected" class, computed server-side from
     selectedRace/selectedGender/selectedSource) and immediately triggers /browse with
     that selection, swapping this whole fragment so the newly-clicked button re-renders
     highlighted. No favorite/report actions or pool-low notice yet -- those depend on
     Week 5 (favorites/reports) and Week 4 (provider switching) slices that don't exist
     yet. See docs/DECISIONS.md for the scope of this slice. -->
<div id="browser" th:fragment="browser">
    <div class="toggle-group" role="group" aria-label="Race">
        <button
            type="button"
            th:each="r : ${races}"
            th:text="${r}"
            th:classappend="${r == selectedRace} ? 'selected' : ''"
            th:attr="hx-get=@{/browse(race=${r},gender=${selectedGender},source=${selectedSource})}"
            hx-target="#browser"
            hx-swap="outerHTML"></button>
    </div>

    <div class="toggle-group" role="group" aria-label="Gender">
        <button
            type="button"
            th:each="g : ${genders}"
            th:text="${g}"
            th:classappend="${g == selectedGender} ? 'selected' : ''"
            th:attr="hx-get=@{/browse(race=${selectedRace},gender=${g},source=${selectedSource})}"
            hx-target="#browser"
            hx-swap="outerHTML"></button>
    </div>

    <div class="toggle-group" role="group" aria-label="Source">
        <button
            type="button"
            th:each="s : ${sources}"
            th:text="${s}"
            th:classappend="${s == selectedSource} ? 'selected' : ''"
            th:attr="hx-get=@{/browse(race=${selectedRace},gender=${selectedGender},source=${s})}"
            hx-target="#browser"
            hx-swap="outerHTML"></button>
    </div>

    <ul>
        <li class="name-row" th:each="n : ${names}">
            <span th:text="${n.displayName}"></span>
            <button
                type="button"
                th:text="${favoritedNameIds.contains(n.id)} ? 'Favorited &#10003;' : 'Favorite'"
                th:disabled="${favoritedNameIds.contains(n.id)}"
                th:attr="hx-post=@{/favorites(nameId=${n.id})}"
                hx-swap="none"
                hx-on::after-request="if(event.detail.successful){this.disabled=true;this.textContent='Favorited ✓'}"></button>
            <button
                type="button"
                th:text="${reportedNameIds.contains(n.id)} ? 'Reported &#10003;' : 'Report'"
                th:disabled="${reportedNameIds.contains(n.id)}"
                th:attr="hx-post=@{/reports(nameId=${n.id})}"
                hx-swap="none"
                hx-on::after-request="if(event.detail.successful){this.disabled=true;this.textContent='Reported ✓'}"></button>
        </li>
        <li th:if="${names.isEmpty()}">No names yet for this race/gender/source.</li>
    </ul>
</div>
</body>
</html>
