spring:
  application:
    name: namegen
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/namegen
    username: namegen
    password: ${DB_PASSWORD:namegen}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    google:
      genai:
        # GoogleGenAiAutoConfiguration requires a non-blank key to start up at all,
        # even when no profile-specific provider (e.g. gemini) is active and nothing
        # calls the ChatClient yet. Real key comes from application-gemini.yml.
        api-key: ${GEMINI_API_KEY:not-configured}

app:
  session-cookie:
    # Defaults to Secure (browsers drop Secure cookies received over plain HTTP).
    # Local dev runs on plain http://localhost with no TLS termination, so set
    # SESSION_COOKIE_SECURE=false in your local environment/.env to persist the
    # session cookie across requests.
    secure: ${SESSION_COOKIE_SECURE:true}
  quality-gate:
    min-length: 2
    max-length: 30
    # Illustrative starter list, not exhaustive -- extend as real/famous names
    # turn up in generated output. Case-insensitive match.
    blocklist: Harry Potter, Frodo Baggins, Gandalf, Legolas, Aragorn, Elon Musk
