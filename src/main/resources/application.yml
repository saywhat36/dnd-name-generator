spring:
  application:
    name: namegen
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/namegen
    username: namegen
    password: ${DB_PASSWORD:namegen}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    google:
      genai:
        # GoogleGenAiAutoConfiguration requires a non-blank key to start up at all,
        # even when no profile-specific provider (e.g. gemini) is active and nothing
        # calls the ChatClient yet. Real key comes from application-gemini.yml.
        api-key: ${GEMINI_API_KEY:not-configured}

app:
  session-cookie:
    # Defaults to Secure (browsers drop Secure cookies received over plain HTTP).
    # Local dev runs on plain http://localhost with no TLS termination, so set
    # SESSION_COOKIE_SECURE=false in your local environment/.env to persist the
    # session cookie across requests.
    secure: ${SESSION_COOKIE_SECURE:true}
  quality-gate:
    min-length: 2
    max-length: 30
    # Illustrative starter list, not exhaustive -- extend as real/famous names
    # turn up in generated output. Case-insensitive match.
    blocklist: Harry Potter, Frodo Baggins, Gandalf, Legolas, Aragorn, Elon Musk
  async:
    pool-replenishment:
      # Small bounded pool -- replenishment is a background task, not a
      # request-serving path, so there's no need for a large thread count.
      # queue-capacity is deliberately kept small relative to max-pool-size:
      # ThreadPoolExecutor only grows past core-pool-size once the queue is
      # full, so a large queue-capacity here would make max-pool-size
      # effectively dead configuration under normal load.
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 8
  pool-replenishment:
    # Ceiling on AI_GENERATED/ACTIVE rows per race+gender combo -- the second
    # cost circuit breaker alongside the daily budget below.
    cap-per-combo: 20
    # How many names to request per replenishment cycle, capped further by
    # however much headroom remains under cap-per-combo.
    batch-size: 5
    # NameService triggers replenish(race, gender) when a combo's ACTIVE/AI_GENERATED
    # count drops below this -- checked only for requests whose source toggle includes
    # AI_GENERATED (AI_GENERATED or BOTH); CURATED-only requests never trigger it.
    replenish-threshold: 5
    budget:
      # Global ceiling on real generation calls per day, across all combos --
      # a safety guardrail, not a cost optimization (see docs/DECISIONS.md,
      # "Pool justified by latency and variety, not token cost").
      max-calls-per-day: 200
