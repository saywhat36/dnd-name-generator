spring:
  application:
    name: namegen
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/namegen
    username: namegen
    password: ${DB_PASSWORD:namegen}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    google:
      genai:
        # GoogleGenAiAutoConfiguration requires a non-blank key to start up at all,
        # even when no profile-specific provider (e.g. gemini) is active and nothing
        # calls the ChatClient yet. Real key comes from application-gemini.yml.
        api-key: ${GEMINI_API_KEY:not-configured}

management:
  endpoints:
    web:
      exposure:
        # health for liveness checks; metrics exposes the Micrometer registry
        # (including Spring AI's chat-client/token-usage timers/counters) for
        # scraping or ad-hoc inspection. No prometheus/actuator-security setup
        # yet -- revisit exposure if this ever needs to be scraped externally.
        include: health,metrics

logging:
  level:
    # SimpleLoggerAdvisor logs full prompt/response text at DEBUG -- name
    # generation has no sensitive user data, so this is safe to leave on by
    # default rather than gating it behind a profile.
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG

app:
  session-cookie:
    # Defaults to Secure (browsers drop Secure cookies received over plain HTTP).
    # Local dev runs on plain http://localhost with no TLS termination, so set
    # SESSION_COOKIE_SECURE=false in your local environment/.env to persist the
    # session cookie across requests.
    secure: ${SESSION_COOKIE_SECURE:true}
  auth:
    # Registration-time username/password policy.
    min-username-length: 3
    # Matches users.username's VARCHAR(64) column (V4__create_users.sql).
    max-username-length: 64
    # No max here -- BCrypt silently truncates input past 72 bytes, but
    # that's an encoder-level property, not something this policy needs
    # to enforce as a rejection.
    min-password-length: 8
  quality-gate:
    min-length: 2
    max-length: 30
    # Illustrative starter list, not exhaustive -- extend as real/famous names
    # turn up in generated output. Case-insensitive match.
    blocklist: Harry Potter, Frodo Baggins, Gandalf, Legolas, Aragorn, Elon Musk
  rate-limit:
    submissions:
      # RateLimitFilter, wired to POST /submissions only (issue #87) -- keyed per
      # authenticated owner, not per session (see RateLimitFilter's own Javadoc).
      # 5/minute is generous for a genuine user, tight enough to blunt a scripted flood.
      capacity: 5
      refill-period: 1m
      bucket-ttl: 10m
  async:
    pool-replenishment:
      # Small bounded pool -- replenishment is a background task, not a
      # request-serving path, so there's no need for a large thread count.
      # queue-capacity is deliberately kept small relative to max-pool-size:
      # ThreadPoolExecutor only grows past core-pool-size once the queue is
      # full, so a large queue-capacity here would make max-pool-size
      # effectively dead configuration under normal load.
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 8
  pool-replenishment:
    # Ceiling on AI_GENERATED/ACTIVE rows per race+gender combo -- the second
    # cost circuit breaker alongside the daily budget below.
    cap-per-combo: 20
    # How many names to request per replenishment cycle, capped further by
    # however much headroom remains under cap-per-combo. A cycle only ever runs
    # when a user on the AI source clicks "Generate five more" (issue #98): name
    # serving no longer auto-triggers replenishment below any threshold, so there
    # is no replenish-threshold here anymore.
    batch-size: 5
    budget:
      # Global ceiling on real generation calls per day, across all combos --
      # a safety guardrail, not a cost optimization (see docs/DECISIONS.md,
      # "Pool justified by latency and variety, not token cost").
      max-calls-per-day: 200
