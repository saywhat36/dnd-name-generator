spring:
  application:
    name: namegen
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/namegen
    username: namegen
    password: ${DB_PASSWORD:namegen}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    google:
      genai:
        # GoogleGenAiAutoConfiguration requires a non-blank key to start up at all,
        # even when no profile-specific provider (e.g. gemini) is active and nothing
        # calls the ChatClient yet. Real key comes from application-gemini.yml.
        api-key: ${GEMINI_API_KEY:not-configured}
